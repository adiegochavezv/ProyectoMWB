<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | LogiStock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex w-100 m-0 p-0" style="height: 100vh;">

    <div th:replace="~{layout/fragments :: nav-dashboard}"></div>

    <main class="flex-grow-1 overflow-auto bg-light p-4">
        <div class="container-fluid">
            <h2 class="mb-4">Panel de Control</h2>
            
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm">
                        <h6>Total Productos</h6>
                        <h3 th:text="${productos != null ? productos.size() : 0}">0</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm">
                        <h6>Categorías</h6>
                        <h3 th:text="${categorias != null ? categorias.size() : 0}">0</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm border-danger">
                        <h6>Alertas Críticas</h6>
                        <h3 class="text-danger" th:text="${criticos != null ? criticos.size() : 0}">0</h3>
                    </div>
                </div>
            </div>

            <div class="card p-3 shadow-sm">
                <canvas id="stockChart" height="100"></canvas>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
