<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acceso | LogiStock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg p-4">
                    <h3 class="text-center fw-bold text-primary mb-4">Ingreso al Sistema</h3>
                    
                    <div th:if="${param.error}" class="alert alert-danger text-center">
                        Usuario o contraseña incorrectos. Verifica tus credenciales.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success text-center">
                        Sesión cerrada exitosamente.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Entrar</button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <a th:href="@{/}" class="text-decoration-none">Volver al Inicio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
