<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | LogiStock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        /* CSS ESPECÍFICO PARA CORREGIR EL MODO OSCURO EN EL LOGIN */
        .card-login {
            background-color: var(--bs-body-bg);
            transition: background-color 0.3s ease;
        }
        [data-bs-theme="dark"] .form-floating > label {
            color: #adb5bd !important;
        }
        [data-bs-theme="dark"] .form-control {
            background-color: #2b3035 !important;
            color: #ffffff !important;
            border-color: #495057;
        }
        [data-bs-theme="dark"] .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        /* Esto previene que el fondo transparente solape las letras al autocompletar Chrome */
        [data-bs-theme="dark"] .form-control:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #2b3035 inset !important;
            -webkit-text-fill-color: #ffffff !important;
        }
    </style>
</head>
<body class="d-flex align-items-center py-4 bg-light transition-all" id="login-body" style="min-height: 100vh;">
    
    <main class="form-signin w-100 m-auto" style="max-width: 450px;">
        <!-- Botón para alternar Modo Oscuro (Opcional, si tienes tu propia lógica, mantén la tuya) -->
        <div class="text-end mb-3">
            <button class="btn btn-sm btn-outline-secondary rounded-circle p-2" id="darkModeToggle" aria-label="Toggle Dark Mode">
                <i class="bi bi-moon-fill" id="darkModeIcon"></i>
            </button>
        </div>

        <div class="card card-login shadow-lg border-0 rounded-4 p-4 p-md-5">
            <div class="text-center mb-4">
                <h2 class="fw-black text-primary mb-0"><i class="bi bi-box-seam-fill"></i> LogiStock</h2>
                <p class="text-muted small">v2.6</p>
            </div>
            
            <h3 class="fw-bold mb-2">Bienvenido de nuevo</h3>
            <p class="text-muted mb-4">Por favor, ingresa tus credenciales corporativas.</p>

            <div th:if="${param.error}" class="alert alert-danger shadow-sm rounded-3">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Correo o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success shadow-sm rounded-3">
                <i class="bi bi-check-circle-fill me-2"></i> Sesión cerrada correctamente.
            </div>

            <form th:action="@{/login}" method="post">
                <!-- EL PLACEHOLDER ES OBLIGATORIO PARA QUE EL FLOATING LABEL FUNCIONE -->
                <div class="form-floating mb-3">
                    <input type="email" class="form-control rounded-3" id="username" name="username" placeholder="nombre@correo.com" required autocomplete="email">
                    <label for="username"><i class="bi bi-envelope me-1"></i> Correo Electrónico</label>
                </div>
                
                <div class="form-floating mb-4">
                    <input type="password" class="form-control rounded-3" id="password" name="password" placeholder="Contraseña" required autocomplete="current-password">
                    <label for="password"><i class="bi bi-shield-lock me-1"></i> Contraseña Segura</label>
                </div>

                <button class="btn btn-primary w-100 py-3 rounded-3 fw-bold shadow-sm hover-shadow" type="submit">
                    Acceder al Sistema
                </button>
            </form>
        </div>
    </main>

    <!-- Script básico para aplicar el data-bs-theme que arregla los colores oscuros nativamente -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('darkModeToggle');
            const icon = document.getElementById('darkModeIcon');
            const html = document.documentElement;
            const body = document.getElementById('login-body');

            // Verifica si el usuario ya tenía modo oscuro activado
            if (localStorage.getItem('theme') === 'dark') {
                activarModoOscuro();
            }

            toggleBtn.addEventListener('click', () => {
                if (html.getAttribute('data-bs-theme') === 'dark') {
                    activarModoClaro();
                } else {
                    activarModoOscuro();
                }
            });

            function activarModoOscuro() {
                html.setAttribute('data-bs-theme', 'dark');
                body.classList.replace('bg-light', 'bg-dark');
                icon.classList.replace('bi-moon-fill', 'bi-sun-fill');
                localStorage.setItem('theme', 'dark');
            }

            function activarModoClaro() {
                html.setAttribute('data-bs-theme', 'light');
                body.classList.replace('bg-dark', 'bg-light');
                icon.classList.replace('bi-sun-fill', 'bi-moon-fill');
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
