<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analítico | LogiStock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex w-100 m-0 p-0 overflow-hidden" style="height: 100vh;">

    <div th:replace="~{layout/fragments :: nav-dashboard}"></div>

    <div class="content p-4 p-md-5 w-100 flex-grow-1 overflow-auto bg-light transition-all" id="main-content-area">
        
        <div id="api-moneda-container" class="mb-5"></div>

        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-1"><i class="bi bi-bar-chart-fill text-primary me-2"></i> Panel de Control y Analítica</h2>
                <p class="text-muted mb-0">Resumen en tiempo real del estado de sus inventarios y operaciones.</p>
            </div>
        </div>
        
        <div class="row g-4 mb-5">
            
            <div class="col-12 col-md-4">
                <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden card-kpi hover-shadow transition-all">
                    <div class="card-body p-4 position-relative">
                        <div class="bg-primary opacity-10 position-absolute top-0 end-0 w-50 h-100 rounded-start-pill" style="z-index: 1;"></div>
                        <div class="position-relative" style="z-index: 2;">
                            <h6 class="text-muted text-uppercase fw-bold mb-2 small tracking-wider">Total de Productos</h6>
                            <h1 class="fw-black mb-0 text-dark display-4" th:text="${#lists.size(productos)}">0</h1>
                            <div class="mt-3 text-success small fw-bold">
                                <i class="bi bi-graph-up-arrow me-1"></i> Stock activo valorizado
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-12 col-md-4">
                <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden card-kpi hover-shadow transition-all">
                    <div class="card-body p-4 position-relative">
                        <div class="bg-success opacity-10 position-absolute top-0 end-0 w-50 h-100 rounded-start-pill" style="z-index: 1;"></div>
                        <div class="position-relative" style="z-index: 2;">
                            <h6 class="text-muted text-uppercase fw-bold mb-2 small tracking-wider">Familias / Categorías</h6>
                            <h1 class="fw-black mb-0 text-dark display-4" th:text="${#lists.size(categorias)}">0</h1>
                            <div class="mt-3 text-success small fw-bold">
                                <i class="bi bi-diagram-3-fill me-1"></i> Clasificación ordenada
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-12 col-md-4">
                <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden card-kpi hover-shadow transition-all cursor-pointer bg-gradient" onclick="window.location.href='/stock-critico'">
                    <div class="card-body p-4 position-relative">
                        <div class="bg-danger opacity-10 position-absolute top-0 end-0 w-50 h-100 rounded-start-pill pulse-bg" style="z-index: 1;"></div>
                        <div class="position-relative d-flex justify-content-between align-items-center" style="z-index: 2;">
                            <div>
                                <h6 class="text-muted text-uppercase fw-bold mb-2 small tracking-wider">Stock Crítico (< 5)</h6>
                                <h1 class="fw-black mb-0 text-danger display-4" th:text="${#lists.size(criticos)}">0</h1>
                            </div>
                            <div class="text-danger fs-1 opacity-75 alert-icon-pulse">
                                <i class="bi bi-exclamation-octagon-fill"></i>
                            </div>
                        </div>
                        <div class="position-relative mt-3 text-end" style="z-index: 2;">
                            <span class="text-danger small fw-bold text-decoration-underline">Revisar reporte urgente <i class="bi bi-arrow-right"></i></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-12 col-xl-8">
                <div class="card shadow-sm border-0 rounded-4 p-4 h-100">
                    <h5 class="fw-bold mb-4 text-dark"><i class="bi bi-activity text-info me-2"></i> Distribución y Volumetría Mensual</h5>
                    <div style="position: relative; height: 350px; width: 100%;">
                        <canvas id="stockChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:replace="~{layout/fragments :: footer-app}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
