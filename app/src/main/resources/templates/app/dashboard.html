<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>LogiStock | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark p-3">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">LogiStock</span>
            <div class="d-flex text-white align-items-center">
                <span class="me-3">Usuario: <span sec:authentication="name" class="fw-bold text-warning"></span></span>
                <span class="me-3 badge bg-primary" sec:authentication="principal.authorities"></span>
                <a th:href="@{/stock-critico}" class="btn btn-sm btn-danger me-2" sec:authorize="hasRole('ADMIN')">Stock Crítico</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-outline-light">Cerrar Sesión</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow-sm mb-5">
            <div class="card-header bg-primary text-white fw-bold">Gestión de Catálogo</div>
            <div class="card-body">
                <form th:action="@{/productos/guardar}" method="post" class="row g-3">
                    <input type="hidden" name="id" id="prodId">
                    <div class="col-md-3">
                        <input type="text" name="nombre" id="prodNombre" class="form-control" placeholder="Nombre de producto" required>
                    </div>
                    <div class="col-md-3">
                        <select name="categoria.id" id="prodCat" class="form-select" required>
                            <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nombre}"></option>
                        </select>
                    </div>
                    <div class="col-md-2"><input type="number" name="cantidad" id="prodCant" class="form-control" placeholder="Stock" required></div>
                    <div class="col-md-2"><input type="number" step="0.01" name="precioCompra" id="prodCompra" class="form-control" placeholder="P. Compra" required></div>
                    <div class="col-md-2"><input type="number" step="0.01" name="precioVenta" id="prodVenta" class="form-control" placeholder="P. Venta" required></div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-success">Guardar en Base de Datos</button>
                    </div>
                </form>
            </div>
        </div>

        <table class="table table-hover table-bordered shadow-sm">
            <thead class="table-dark">
                <tr><th>ID</th><th>Producto</th><th>Categoría</th><th>Stock</th><th>Compra</th><th>Venta</th><th>Acciones</th></tr>
            </thead>
            <tbody>
                <tr th:each="p : ${productos}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.nombre}" class="fw-bold"></td>
                    <td th:text="${p.categoria.nombre}"></td>
                    <td th:text="${p.cantidad}"></td>
                    <td th:text="'S/ ' + ${p.precioCompra}"></td>
                    <td th:text="'S/ ' + ${p.precioVenta}"></td>
                    <td>
                        <a th:href="@{/productos/eliminar/{id}(id=${p.id})}" class="btn btn-sm btn-danger">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <h4 class="mt-5 mb-3 fw-bold">Registro de Auditoría (MySQL)</h4>
        <table class="table table-sm table-striped border">
            <thead>
                <tr class="bg-light"><th>Fecha</th><th>Usuario</th><th>Acción</th><th>Detalles</th></tr>
            </thead>
            <tbody>
                <tr th:each="a : ${auditorias}">
                    <td th:text="${#temporals.format(a.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${a.usuarioEmail}"></td>
                    <td><span class="badge bg-secondary" th:text="${a.accion}"></span></td>
                    <td th:text="${a.detalle}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
