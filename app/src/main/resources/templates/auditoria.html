<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Auditoría | LogiStock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{layout/fragments :: nav-dashboard}"></div>
    
    <div class="content p-4 w-100">
        <h2 class="mb-4 text-primary">📋 Registro de Auditoría</h2>
        <div class="card shadow">
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha y Hora</th>
                            <th>Usuario</th>
                            <th>Acción</th>
                            <th>Detalle Técnico</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="audit : ${auditorias}">
                            <td th:text="${#temporals.format(audit.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                            <td class="fw-bold" th:text="${audit.usuarioEmail}"></td>
                            <td><span class="badge bg-info" th:text="${audit.accion}"></span></td>
                            <td th:text="${audit.detalle}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
