spring.datasource.url=jdbc:mysql://localhost:3306/logistock_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ¡CLAVE! Cambiar update por none o validate. 
# Esto le dice a Spring: "La base de datos ya está creada, solo conéctate".

spring.jpa.show-sql=true
# Cambia 'validate' por 'update' solo si quieres que Spring ajuste los tipos automáticamente
# O déjalo en 'validate' pero con el @Column precision=10, scale=2 arreglado arriba.
spring.jpa.hibernate.ddl-auto=update